<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的照片</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
         body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .photo-container {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 1200px;
        }
        
        .photo-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f5f5f5; /* 添加背景色以便看到图片区域 */
        }
        
        .photo-wrapper img {
            width: 100%;
            height: auto;
            max-height: 60vh;        /* 手机端减小最大高度 */
            object-fit: contain;
            display: block;
        }
        
        .photo-info {
            padding: 25px;
            text-align: center;
        }
        
        .photo-title {
            font-size: 24px;
            color: #333;
            margin-bottom: 10px;
        }
        
        .photo-desc {
            color: #666;
            font-size: 14px;
            margin-bottom: 20px;
        }
        
        .photo-link {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border-radius: 25px;
            text-decoration: none;
        }
        
        /* 移动端适配 */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            
            .photo-wrapper img {
                max-height: 50vh;    /* 手机端进一步限制高度 */
            }
            
            .photo-info {
                padding: 15px;
            }
            
            .photo-title {
                font-size: 20px;
            }
        
       
    </style>
</head>
<body>
    <div class="photo-container">
        <img src="photo.png" alt="我的照片">
        <div class="photo-info">
            <h1 class="photo-title">截图微信扫码</h1>
            <p class="photo-desc"></p>
            <a href="https://github.com" class=\"photo-link\">查看详情</a>
        </div>
    </div>
</body>
</html>
